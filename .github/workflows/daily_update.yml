name: Daily Sports Data Pipeline

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: '수집 날짜 YYYYMMDD (미입력시 어제)'
        required: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 데이터 수집 실행
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python main.py ${{ github.event.inputs.date }}
          else
            python main.py
          fi
